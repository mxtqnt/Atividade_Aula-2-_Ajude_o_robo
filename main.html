<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Lógica e Programação - Robô no Labirinto</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #0084ff; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 80px; 
            box-sizing: border-box;
            overflow-x: hidden;
        }
        #stats { display: flex; gap: 30px; font-size: 20px; background: #0084ff; padding: 10px 30px; border-radius: 50px; border: 1px solid #ffffff; margin-bottom: 20px; }
        #game-container { display: flex; gap: 30px; background: #0068ad; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; }
        canvas { border: 3px solid #4e4e4e; background: #ffffff; border-radius: 5px; }
        #editor-container { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        
        #code-editor { 
            height: 300px; background: #00274b; color: #00ff41; padding: 15px; 
            border-radius: 5px; border: 2px solid #533483; overflow-y: auto;
            white-space: pre-wrap; outline: none; font-size: 14px; line-height: 1.4;
            word-wrap: break-word;
        }
        
        button { background: #e94560; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #ff4d6d; transform: scale(1.02); }
        button:disabled { background: #555; opacity: 0.6; }

        /* Estilo do Histórico Lateral */
        #history-sidebar {
            position: fixed;
            right: -350px;
            top: 0;
            width: 300px;
            height: 100%;
            background: #00274b;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            border-left: 4px solid #e94560;
        }
        #history-sidebar.open { right: 0; }
        #toggle-history { position: fixed; right: 20px; top: 20px; z-index: 1001; background: #533483; }

        .history-item {
            background: #003a70;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #0084ff;
        }
        .history-item h4 { margin: 0 0 10px 0; color: #f1c40f; font-size: 14px; }
        .history-item img { width: 100%; border: 1px solid #fff; border-radius: 4px; margin-bottom: 10px; }
        .history-code { font-size: 11px; color: #00ff41; background: #001a33; padding: 5px; border-radius: 3px; max-height: 80px; overflow-y: auto; }

        .executing { background: rgba(255, 255, 255, 0.3); color: #fff; }
        .success-line { color: #00ff00; font-weight: bold; }
        .error-line { color: #ff0000; font-weight: bold; }
        
        #message { margin-top: 10px; height: 24px; text-align: center; font-weight: bold; color: #f1c40f; }
        .level-tag { color: #ffffff; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #ff00ff; color: white;
            text-align: center; padding: 15px 0; font-size: 14px; border-top: 2px solid #ffffff;
        }
    </style>
</head>
<body>

    <button id="toggle-history">Ver Histórico</button>

    <div id="history-sidebar">
        <h3>Histórico de Níveis</h3>
        <div id="history-list">
            <p style="font-size: 12px; color: #aaa;">Complete um nível para salvar seu código aqui!</p>
        </div>
    </div>

    <div style="text-align: center">
        <h1>Ajude o Robô 🤖</h1>
        <div id="level-info" class="level-tag">Nível: 3x3</div>
    </div>

    <div id="stats">
        <div id="stars">⭐ 0</div>
        <div id="hearts">❤️ 3</div>
    </div>

    <div id="game-container">
        <canvas id="mazeCanvas" width="400" height="400"></canvas>
        
        <div id="editor-container">
            <div id="code-editor" contenteditable="true" spellcheck="false" placeholder="Comandos: cima, baixo, esquerda, direita"></div>
            <button id="play-btn">Testar código ▶</button>
            <div id="message"></div>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Ana Misque</strong> | 
        Siga no Instagram: <a href="https://instagram.com/ana_misque" target="_blank">@ana_misque</a>
    </footer>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const editor = document.getElementById('code-editor');
        const playBtn = document.getElementById('play-btn');
        const msgDisplay = document.getElementById('message');
        const levelDisplay = document.getElementById('level-info');
        const historySidebar = document.getElementById('history-sidebar');
        const historyList = document.getElementById('history-list');
        const toggleHistoryBtn = document.getElementById('toggle-history');

        let dificuldade = 3;
        let cellSize, grid, robot, goal;
        let stars = 0, lives = 3;
        let gameHistory = [];

        class Cell {
            constructor(r, c) {
                this.r = r; this.c = c;
                this.walls = [true, true, true, true];
                this.visited = false;
            }
        }

        // Toggle do Menu Lateral
        toggleHistoryBtn.onclick = () => {
            historySidebar.classList.toggle('open');
            toggleHistoryBtn.innerText = historySidebar.classList.contains('open') ? "❌ Fechar" : "📜 Ver Histórico";
        };

        function initGame() {
            cellSize = canvas.width / dificuldade;
            levelDisplay.innerText = `Nível Atual: ${dificuldade}x${dificuldade}`;
            editor.focus();
            
            grid = Array.from({ length: dificuldade }, (_, r) => 
                Array.from({ length: dificuldade }, (_, c) => new Cell(r, c))
            );
            
            generateMaze(0, 0);
            robot = { x: 0, y: 0 };
            goal = { x: dificuldade - 1, y: dificuldade - 1 };
            updateUI();
            draw();
        }

        function generateMaze(r, c) {
            grid[r][c].visited = true;
            let dirs = [[-1,0,0,2],[0,1,1,3],[1,0,2,0],[0,-1,3,1]].sort(() => Math.random() - 0.5);
            for (let [dr, dc, w, ow] of dirs) {
                let nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < dificuldade && nc >= 0 && nc < dificuldade && !grid[nr][nc].visited) {
                    grid[r][c].walls[w] = false;
                    grid[nr][nc].walls[ow] = false;
                    generateMaze(nr, nc);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#1a1a2e";
            ctx.lineWidth = Math.max(1, 5 - (dificuldade/3));

            for (let r = 0; r < dificuldade; r++) {
                for (let c = 0; c < dificuldade; c++) {
                    let x = c * cellSize, y = r * cellSize;
                    if (grid[r][c].walls[0]) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+cellSize,y); ctx.stroke(); }
                    if (grid[r][c].walls[1]) { ctx.beginPath(); ctx.moveTo(x+cellSize,y); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke(); }
                    if (grid[r][c].walls[2]) { ctx.beginPath(); ctx.moveTo(x,y+cellSize); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke(); }
                    if (grid[r][c].walls[3]) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+cellSize); ctx.stroke(); }
                }
            }
            ctx.fillStyle = "#4cd137";
            ctx.fillRect(goal.x * cellSize + (cellSize*0.3), goal.y * cellSize + (cellSize*0.3), cellSize * 0.4, cellSize * 0.4);
            ctx.font = `${cellSize * 0.7}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🤖", robot.x * cellSize + cellSize/2, robot.y * cellSize + cellSize/2);
        }

        function saveToHistory(codeText) {
            const mazeImage = canvas.toDataURL(); // "Tira foto" do labirinto
            const historyItem = {
                level: `${dificuldade}x${dificuldade}`,
                code: codeText,
                image: mazeImage
            };
            gameHistory.unshift(historyItem); // Adiciona ao topo da lista
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";
            gameHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <h4>Nível ${item.level}</h4>
                    <img src="${item.image}" alt="Labirinto">
                    <div class="history-code">${item.code}</div>
                `;
                historyList.appendChild(div);
            });
        }

        async function executeDebug() {
            const rawText = editor.innerText;
            const regex = /(cima|baixo|esquerda|direita)/gi;
            const matches = rawText.match(regex) || [];
            
            if (matches.length === 0) {
                msgDisplay.innerText = "Nenhum comando reconhecido!";
                return;
            }

            // Prepara a visualização dos comandos
            editor.innerHTML = matches.map(m => `<span>${m.toLowerCase()}</span>`).join(' ');
            const spans = editor.querySelectorAll('span');
            
            playBtn.disabled = true;
            robot = { x: 0, y: 0 }; // Garante que começa no início
            draw();
            msgDisplay.innerText = "Processando lógica...";

            let colidiu = false;

            for (let i = 0; i < matches.length; i++) {
                let cmd = matches[i].toLowerCase();
                let currentSpan = spans[i];
                currentSpan.className = 'executing';
                
                let cell = grid[robot.y][robot.x];
                let moved = false;

                // Lógica de movimentação
                if (cmd === "cima" && !cell.walls[0]) { robot.y--; moved = true; }
                else if (cmd === "direita" && !cell.walls[1]) { robot.x++; moved = true; }
                else if (cmd === "baixo" && !cell.walls[2]) { robot.y++; moved = true; }
                else if (cmd === "esquerda" && !cell.walls[3]) { robot.x--; moved = true; }

                draw();
                currentSpan.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                await new Promise(r => setTimeout(r, 300));

                if (moved) {
                    currentSpan.className = 'success-line';
                    // Se chegar no objetivo durante o percurso, para a execução
                    if (robot.x === goal.x && robot.y === goal.y) break;
                } else {
                    // ERRO: Bateu na parede
                    currentSpan.className = 'error-line';
                    lives--;
                    msgDisplay.innerText = `COLISÃO NO PASSO ${i+1}!`;
                    colidiu = true;
                    break; 
                }
            }

            // Verificação Final após o loop
            if (!colidiu && robot.x === goal.x && robot.y === goal.y) {
                saveToHistory(rawText);
                stars++;
                dificuldade++;
                msgDisplay.innerText = "CÓDIGO EFICIENTE! PRÓXIMO NÍVEL.";
                setTimeout(() => {
                    editor.innerHTML = "";
                    initGame();
                }, 1200);
            } else {
                // Se não colidiu mas acabou os comandos fora do alvo
                if(!colidiu) {
                    lives--;
                    msgDisplay.innerText = "LÓGICA INCOMPLETA: Fim do código.";
                }
                
                updateUI();
                
                // Aguarda um pouco para o usuário ver o erro e volta ao início
                setTimeout(() => {
                    robot = { x: 0, y: 0 };
                    draw();
                    if(lives <= 0) resetGame();
                }, 800);
            }
            playBtn.disabled = false;
        }

        function updateUI() {
            document.getElementById('stars').innerText = "⭐ " + stars;
            document.getElementById('hearts').innerText = "❤️ " + lives;
        }

        function resetGame() {
            alert("SISTEMA RESETADO!");
            stars = 0; lives = 3; dificuldade = 3;
            editor.innerHTML = "";
            initGame();
            playBtn.disabled = false;
        }

        playBtn.addEventListener('click', executeDebug);
        initGame();
    </script>
</body>
</html>
